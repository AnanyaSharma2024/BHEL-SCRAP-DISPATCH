<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHEL Jhansi - Scrap Dispatch Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container login-container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="login-logo-wrap text-center">
                    <img src="img/bhel-logo.svg" alt="BHEL Logo" class="login-logo">
                    <div class="login-company-name">BHARAT HEAVY ELECTRICALS LIMITED</div>
                </div>
                <div class="card shadow-lg">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0">Jhansi Plant — Security Portal</h4>
                        <small>Scrap Dispatch Management System</small>
                    </div>
                    <div class="card-body p-4">
                        <div id="error-alert" class="alert alert-danger d-none"></div>
                        <form id="login-form">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" id="username" class="form-control" required placeholder="Enter username">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" id="password" class="form-control" required placeholder="Enter password">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">Secure Login</button>
                        </form>
                    </div>
                </div>
                <footer class="bhel-footer">Bharat Heavy Electricals Limited &mdash; Jhansi Plant</footer>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
