<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BHEL - Generate Scrap Dispatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <span class="navbar-brand bhel-brand">
                <img src="img/bhel-logo.svg" alt="BHEL">
                Create Scrap Security Gate Pass
            </span>
            <a href="admin-dashboard.html" class="btn btn-outline-light btn-sm">Back</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-header bg-white"><h5 class="mb-0 text-primary">Consignment and Logistics Entry</h5></div>
                    <div class="card-body">
                        <form id="final-dispatch-form">
                            <!-- Department report se aayi auto-filled details -->
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Origin Department</label>
                                    <input type="text" id="disp-dept" class="form-control" readonly>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Material Type & Reported Weight (kg)</label>
                                    <input type="text" id="disp-material" class="form-control" readonly>
                                </div>
                            </div>
                            <hr>
                            <div class="mb-3">
                                <label class="form-label">Security Gate Pass Number</label>
                                <input type="text" class="form-control bg-light" value="Auto-generated on submit (e.g. GP-2026-XXX)" readonly>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Vehicle Registration Number (Truck No.)</label>
                                <input type="text" id="vehicleNumber" class="form-control" placeholder="e.g. MP-04-HE-8921" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Approved MSTC Base Rate (per kg in ₹)</label>
                                <input type="number" id="baseRate" class="form-control" placeholder="e.g. 90" min="0" step="0.01" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Destination (Consignee Name & City)</label>
                                <input type="text" id="destination" class="form-control" placeholder="e.g. MSTC Authorized Vendor Yard, Jhansi" required>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label class="form-label">Gross Truck Weight (kg)</label>
                                    <input type="number" id="grossWeight" class="form-control" placeholder="e.g. 12000" min="0" step="0.1" oninput="calculateNetWeight()" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Tare Truck Weight (kg)</label>
                                    <input type="number" id="tareWeight" class="form-control" placeholder="e.g. 7000" min="0" step="0.1" oninput="calculateNetWeight()" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Calculated Net Weight (kg)</label>
                                    <input type="number" id="netWeight" class="form-control" readonly value="0">
                                </div>
                            </div>
                            <h6 class="text-secondary mt-4 mb-2">Driver Information</h6>
                            <div class="mb-3">
                                <label class="form-label">Driver's Name</label>
                                <input type="text" id="driverName" class="form-control" placeholder="e.g. Rajesh Kumar" required>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Driving License (DL) Number</label>
                                    <input type="text" id="driverLicense" class="form-control" placeholder="e.g. DL-04-2019001" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Driver's Contact Mobile</label>
                                    <input type="tel" id="driverContact" class="form-control" placeholder="e.g. 9876543210" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mt-2">Generate Dispatch & Print Challan</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/dispatch.js"></script>
</body>
</html>
