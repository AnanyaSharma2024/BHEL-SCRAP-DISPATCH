<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BHEL - Change Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <span class="navbar-brand bhel-brand">
                <img src="img/bhel-logo.svg" alt="BHEL">
                Change Password
            </span>
            <a href="#" id="back-link" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-header bg-white"><h5 class="mb-0 text-primary">Update Your Login Password</h5></div>
                    <div class="card-body">
                        <div id="msg-alert" class="alert d-none"></div>
                        <form id="change-pass-form">
                            <div class="mb-3">
                                <label class="form-label">Current Password</label>
                                <input type="password" id="currentPassword" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">New Password</label>
                                <input type="password" id="newPassword" class="form-control" minlength="6" required>
                                <small class="text-muted">Minimum 6 characters.</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Confirm New Password</label>
                                <input type="password" id="confirmPassword" class="form-control" minlength="6" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Update Password</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');

        if (!token) { window.location.href = 'login.html'; }

        document.getElementById('back-link').href = role === 'admin' ? 'admin-dashboard.html' : 'dept-dashboard.html';

        document.getElementById('change-pass-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const alertBox = document.getElementById('msg-alert');

            if (newPassword !== confirmPassword) {
                alertBox.className = 'alert alert-danger';
                alertBox.innerText = 'New password and confirm password do not match.';
                return;
            }

            try {
                const res = await apiFetch('/api/auth/change-password', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ currentPassword, newPassword })
                });
                const result = await res.json();

                if (res.ok) {
                    alertBox.className = 'alert alert-success';
                    alertBox.innerText = result.message + ' Redirecting to login...';
                    document.getElementById('change-pass-form').reset();
                    // Password change ke baad refresh token bhi invalidate ho gaya hai server pe -
                    // isliye fresh login zaroori hai
                    setTimeout(() => apiLogout(), 1500);
                } else {
                    alertBox.className = 'alert alert-danger';
                    alertBox.innerText = result.message || 'Failed to update password.';
                }
            } catch (err) {
                alertBox.className = 'alert alert-danger';
                alertBox.innerText = 'Server connection error.';
                console.error(err);
            }
        });
    </script>
    <script src="js/api.js"></script>
</body>
</html>
